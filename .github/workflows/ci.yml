name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff
      - name: ruff check
        run: ruff check orchestrator tests
      - name: ruff format --check
        run: ruff format --check orchestrator tests

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    # v0.1 baseline: codebase ainda nao passa em strict typecheck.
    # Mantemos o job rodando (visibilidade) mas nao bloqueia merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: mypy
        run: mypy orchestrator

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    # v0.1 baseline: 1 teste do scrubber falhando (regex BR phone greedy).
    # Issue rastreando o fix; nao bloquear PRs externos enquanto isso.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest
        run: pytest --cov=orchestrator --cov-report=term-missing

  build-image:
    name: Build orchestrator image
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/images/orchestrator/Dockerfile
          push: false
          tags: cai-orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
