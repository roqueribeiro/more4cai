name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the fields below.

        **Do not report security vulnerabilities here.** See [SECURITY.md](https://github.com/roqueribeiro/more4cai/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run `make smoke`, the orchestrator crashes with ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal sequence of commands or actions.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: cai-version
    attributes:
      label: CAI version / commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: How are you running CAI?
      options:
        - Docker Compose (default profile)
        - Docker Compose (with extra profiles)
        - Python / uv directly
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Host OS and version
      placeholder: Windows 11 + WSL2 Ubuntu 22.04 / macOS 14 / Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version (if not Docker)
      placeholder: 3.13.1

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Output from `docker logs cai-orchestrator` or the failing command. Please scrub real targets and credentials first.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
